{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-4 p-md-5 animate-slide-up">
                    <div class="text-center mb-4">
                        <div class="auth-icon mb-3">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h2 class="fw-bold">New Password</h2>
                        <p class="text-muted">Choose a strong new password</p>
                    </div>

                    <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="password"
                                       name="password" placeholder="At least 6 characters" required minlength="6">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label small fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="confirm_password"
                                       name="confirm_password" placeholder="Re-enter password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-glow w-100 py-2 fw-semibold">
                            <i class="bi bi-check-circle me-1"></i> Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
