{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-4 p-md-5 animate-slide-up">
                    <div class="text-center mb-4">
                        <div class="auth-icon mb-3">
                            <i class="bi bi-person-plus-fill"></i>
                        </div>
                        <h2 class="fw-bold">Create Account</h2>
                        <p class="text-muted">Join FlashMind for free</p>
                    </div>

                    <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control glass-input" id="username"
                                       name="username" placeholder="Choose a username" required minlength="3">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold">Email</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control glass-input" id="email"
                                       name="email" placeholder="you@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="password"
                                       name="password" placeholder="At least 6 characters" required minlength="6">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label small fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="confirm_password"
                                       name="confirm_password" placeholder="Re-enter password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-glow w-100 py-2 fw-semibold">
                            <i class="bi bi-rocket-takeoff me-1"></i> Create Account
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small">
                            Already have an account?
                            <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Sign In</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
