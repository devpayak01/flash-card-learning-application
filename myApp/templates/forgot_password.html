{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-4 p-md-5 animate-slide-up">
                    <div class="text-center mb-4">
                        <div class="auth-icon mb-3">
                            <i class="bi bi-envelope-paper-heart"></i>
                        </div>
                        <h2 class="fw-bold">Reset Password</h2>
                        <p class="text-muted">Enter your email to receive a reset link</p>
                    </div>

                    <form method="POST" action="{{ url_for('forgot_password') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-4">
                            <label for="email" class="form-label small fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control glass-input" id="email"
                                       name="email" placeholder="you@example.com" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-glow w-100 py-2 fw-semibold">
                            <i class="bi bi-send me-1"></i> Send Reset Link
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('login') }}" class="text-muted small text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
