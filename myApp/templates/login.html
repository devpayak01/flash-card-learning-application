{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-4 p-md-5 animate-slide-up">
                    <div class="text-center mb-4">
                        <div class="auth-icon mb-3">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Sign in to your account</p>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control glass-input" id="username"
                                       name="username" placeholder="Enter username or email" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="password"
                                       name="password" placeholder="Enter password" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="{{ url_for('forgot_password') }}" class="small text-primary text-decoration-none">
                                Forgot Password?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-glow w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small">
                            Don't have an account?
                            <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
